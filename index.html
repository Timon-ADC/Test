<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Annoy Him</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: sans-serif;
      gap: 40px;
      padding: 20px;
    }

    .character-container {
      width: 220px;
      height: 220px;
      position: relative;
    }

    /* ── SVG cartoon man ── */
    svg#man {
      width: 100%;
      height: 100%;
      transition: transform 0.1s ease;
    }

    /* Eyes default */
    .eye-left, .eye-right {
      transition: all 0.15s ease;
    }

    /* Mouth default */
    .mouth {
      transition: d 0.15s ease;
    }

    /* Eyebrows */
    .brow-left, .brow-right {
      transition: all 0.15s ease;
    }

    /* Angry state applied via JS */
    svg#man.angry {
      transform: scale(1.08);
    }

    /* Button */
    #annoyBtn {
      background: #e63946;
      color: white;
      border: none;
      border-radius: 18px;
      padding: 22px 60px;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(230, 57, 70, 0.45);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #annoyBtn:active {
      transform: scale(0.96);
      box-shadow: 0 3px 10px rgba(230, 57, 70, 0.35);
    }
  </style>
</head>
<body>

  <div class="character-container">
    <!--
      Cartoon man built entirely with inline SVG.
      IDs on face parts are toggled by JS.
    -->
    <svg id="man" viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">

      <!-- Body -->
      <rect x="28" y="90" width="44" height="50" rx="8" fill="#4a90d9"/>

      <!-- Neck -->
      <rect x="43" y="78" width="14" height="16" rx="4" fill="#f4c27f"/>

      <!-- Head -->
      <ellipse cx="50" cy="58" rx="26" ry="28" fill="#f4c27f"/>

      <!-- Hair -->
      <ellipse cx="50" cy="32" rx="26" ry="12" fill="#3b2a1a"/>
      <rect x="24" y="32" width="8" height="14" rx="4" fill="#3b2a1a"/>
      <rect x="68" y="32" width="8" height="14" rx="4" fill="#3b2a1a"/>

      <!-- Ears -->
      <ellipse cx="24" cy="58" rx="5" ry="7" fill="#f4c27f"/>
      <ellipse cx="76" cy="58" rx="5" ry="7" fill="#f4c27f"/>

      <!-- Eyebrows (normal: flat) -->
      <line id="browLeft"  x1="34" y1="47" x2="44" y2="47" stroke="#3b2a1a" stroke-width="2.5" stroke-linecap="round"/>
      <line id="browRight" x1="56" y1="47" x2="66" y2="47" stroke="#3b2a1a" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Eyes (normal: circles) -->
      <circle id="eyeLeft"  cx="39" cy="55" r="4" fill="white"/>
      <circle id="eyeRight" cx="61" cy="55" r="4" fill="white"/>
      <circle id="pupilLeft"  cx="39" cy="55" r="2" fill="#222"/>
      <circle id="pupilRight" cx="61" cy="55" r="2" fill="#222"/>

      <!-- Nose -->
      <ellipse cx="50" cy="63" rx="3" ry="2" fill="#e0a86a"/>

      <!-- Mouth (normal: smile) -->
      <path id="mouth" d="M 40 72 Q 50 80 60 72" stroke="#a0522d" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- Arms -->
      <rect x="6"  y="90" width="22" height="10" rx="5" fill="#4a90d9"/>
      <rect x="72" y="90" width="22" height="10" rx="5" fill="#4a90d9"/>

      <!-- Legs -->
      <rect x="30" y="136" width="16" height="20" rx="6" fill="#2c2c54"/>
      <rect x="54" y="136" width="16" height="20" rx="6" fill="#2c2c54"/>

      <!-- Shoes -->
      <ellipse cx="38" cy="156" rx="10" ry="5" fill="#1a1a2e"/>
      <ellipse cx="62" cy="156" rx="10" ry="5" fill="#1a1a2e"/>

    </svg>
  </div>

  <button id="annoyBtn">ANNOY</button>

  <script>
    const man        = document.getElementById('man');
    const browLeft   = document.getElementById('browLeft');
    const browRight  = document.getElementById('browRight');
    const eyeLeft    = document.getElementById('eyeLeft');
    const eyeRight   = document.getElementById('eyeRight');
    const pupilLeft  = document.getElementById('pupilLeft');
    const pupilRight = document.getElementById('pupilRight');
    const mouth      = document.getElementById('mouth');

    let resetTimer = null;

    function setAngry() {
      // Scale up the whole figure
      man.classList.add('angry');

      // Angry V-shaped eyebrows (inner ends drop down)
      browLeft.setAttribute('x1', '34');
      browLeft.setAttribute('y1', '50');
      browLeft.setAttribute('x2', '44');
      browLeft.setAttribute('y2', '45');

      browRight.setAttribute('x1', '56');
      browRight.setAttribute('y1', '45');
      browRight.setAttribute('x2', '66');
      browRight.setAttribute('y2', '50');

      // Eyes slightly squinted — make them narrower ellipses
      eyeLeft.setAttribute('rx', '4');
      eyeLeft.setAttribute('ry', '2.5');
      eyeRight.setAttribute('rx', '4');
      eyeRight.setAttribute('ry', '2.5');

      // Pupils look forward (toward viewer center)
      pupilLeft.setAttribute('cx', '40');
      pupilRight.setAttribute('cx', '60');

      // Mouth → angry frown
      mouth.setAttribute('d', 'M 40 76 Q 50 69 60 76');
    }

    function setNormal() {
      man.classList.remove('angry');

      // Reset eyebrows
      browLeft.setAttribute('x1', '34');
      browLeft.setAttribute('y1', '47');
      browLeft.setAttribute('x2', '44');
      browLeft.setAttribute('y2', '47');

      browRight.setAttribute('x1', '56');
      browRight.setAttribute('y1', '47');
      browRight.setAttribute('x2', '66');
      browRight.setAttribute('y2', '47');

      // Reset eyes
      eyeLeft.setAttribute('rx', '4');
      eyeLeft.setAttribute('ry', '4');
      eyeRight.setAttribute('rx', '4');
      eyeRight.setAttribute('ry', '4');

      // Reset pupils
      pupilLeft.setAttribute('cx', '39');
      pupilRight.setAttribute('cx', '61');

      // Reset mouth
      mouth.setAttribute('d', 'M 40 72 Q 50 80 60 72');
    }

    document.getElementById('annoyBtn').addEventListener('click', () => {
      // Clear any pending reset so rapid tapping keeps him angry
      if (resetTimer) clearTimeout(resetTimer);

      setAngry();

      // Return to normal after 1.2 seconds
      resetTimer = setTimeout(setNormal, 1200);
    });
  </script>

</body>
</html>
