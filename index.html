<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Person Image Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
      background: #f5f5f5;
    }
    h2 {
      margin-bottom: 10px;
    }
    input {
      padding: 12px;
      font-size: 16px;
      width: 80%;
      max-width: 300px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #007BFF;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    #results {
      margin-top: 20px;
    }
    img {
      width: 100%;
      max-width: 300px;
      margin: 10px auto;
      display: block;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h2>Image Scanner</h2>
<input id="nameInput" placeholder="Enter a person's name">
<br>
<button onclick="scan()">Scan</button>

<div id="results"></div>

<script>
async function scan() {
  const query = document.getElementById("nameInput").value;
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "Scanning...";

  try {
    // Step 1: get token
    const tokenRes = await fetch("https://duckduckgo.com/?q=" + encodeURIComponent(query));
    const tokenText = await tokenRes.text();
    const vqdMatch = tokenText.match(/vqd='(.*?)'/);

    if (!vqdMatch) {
      resultsDiv.innerHTML = "Failed to get results.";
      return;
    }

    const vqd = vqdMatch[1];

    // Step 2: fetch images
    const imgRes = await fetch(`https://duckduckgo.com/i.js?q=${encodeURIComponent(query)}&vqd=${vqd}&o=json`);
    const imgData = await imgRes.json();

    const images = imgData.results.slice(0, 3);

    resultsDiv.innerHTML = "";

    images.forEach(img => {
      const imageEl = document.createElement("img");
      imageEl.src = img.image;
      resultsDiv.appendChild(imageEl);
    });

    if (images.length === 0) {
      resultsDiv.innerHTML = "No images found.";
    }

  } catch (err) {
    resultsDiv.innerHTML = "Error fetching images.";
  }
}
</script>

</body>
</html>
